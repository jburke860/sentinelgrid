name: Refresh live data snapshot

on:
  schedule:
    # 06z run refreshes baseline anchors + stations; others stations only.
    - cron: "0 6 * * *"
    - cron: "0 0,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch baseline anchors (daily, at 06z)
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        run: node web/scripts/fetch-live-data.mjs
      - name: Fetch verified stations
        run: node web/scripts/fetch-stations.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/src/data/live-snapshot.json web/public/data/stations.json
          git diff --cached --quiet || git commit -m "chore: refresh live data snapshots"
          git push
