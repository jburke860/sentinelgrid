name: ci

on:
  push:
  pull_request:

jobs:
  skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check project skeleton
        run: sh scripts/dev-check.sh

  edge-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S edge-sim -B edge-sim/build
      - name: Build
        run: cmake --build edge-sim/build
      - name: Smoke test (valid NDJSON, 2 cycles)
        run: |
          ./edge-sim/build/edge-sim --count 2 --interval-ms 10 | python3 -c "
          import json, sys
          lines = [json.loads(l) for l in sys.stdin]
          assert len(lines) == 100, len(lines)
          assert all(l['topic'].endswith('/telemetry') for l in lines)
          print('ok:', len(lines), 'lines')
          "

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint api, worker, scripts
        run: ruff check api worker scripts

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r api/requirements.txt
      - name: Compile check
        run: python -m compileall api/app
      - name: Run unit tests (DB tests skip without PostgreSQL)
        working-directory: api
        run: python -m pytest

  api-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: sentinelgrid
          POSTGRES_USER: sentinelgrid
          POSTGRES_PASSWORD: sentinelgrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinelgrid -d sentinelgrid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sentinelgrid:sentinelgrid@localhost:5432/sentinelgrid
      MQTT_INGEST_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r api/requirements.txt
      - name: Apply schema init scripts
        run: |
          for f in infra/db/init/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Alembic stamp baseline + upgrade to head
        run: |
          alembic -c db/alembic.ini stamp 0001
          alembic -c db/alembic.ini upgrade head
          alembic -c db/alembic.ini current
      - name: Run tests (integration tests active against service DB)
        working-directory: api
        run: python -m pytest

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt
      - name: Install dependencies
        run: pip install -r worker/requirements.txt
      - name: Compile check
        run: python -m compileall worker/app
      - name: Run unit tests
        working-directory: worker
        run: python -m pytest

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Unit tests (simulation engine)
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        run: npm run build

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Smoke tests
        working-directory: web
        run: npm run test:e2e
