# Local dev broker config. Anonymous access is OFF; clients authenticate with
# the dev user in ./passwd (sentinelgrid / sentinelgrid — local use only).
# Regenerate the hash with: make mosquitto-passwd
listener 1883
allow_anonymous false
# The compose command copies the checked-in hash to this path with perms
# mosquitto accepts (bind-mount permissions don't translate reliably).
password_file /mosquitto/passwd
persistence true
persistence_location /mosquitto/data/
log_dest stdout
