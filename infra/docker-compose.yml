services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sentinelgrid-postgres
    environment:
      POSTGRES_DB: sentinelgrid
      POSTGRES_USER: sentinelgrid
      POSTGRES_PASSWORD: sentinelgrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelgrid -d sentinelgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sentinelgrid-mosquitto
    # Copy the checked-in password hash to a path with permissions mosquitto
    # accepts (bind mounts don't translate file modes reliably on macOS).
    command: >
      sh -c "cp /mosquitto/config/passwd.src /mosquitto/passwd
      && chown mosquitto:mosquitto /mosquitto/passwd
      && chmod 600 /mosquitto/passwd
      && exec mosquitto -c /mosquitto/config/mosquitto.conf"
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd.src:ro

  api:
    build:
      context: ../api
    container_name: sentinelgrid-api
    environment:
      DATABASE_URL: postgresql://sentinelgrid:sentinelgrid@postgres:5432/sentinelgrid
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: sentinelgrid
      MQTT_PASSWORD: sentinelgrid
      # Uncomment to require X-API-Key on write endpoints:
      # SENTINELGRID_API_KEY: change-me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  worker:
    build:
      context: ../worker
    container_name: sentinelgrid-worker
    environment:
      DATABASE_URL: postgresql://sentinelgrid:sentinelgrid@postgres:5432/sentinelgrid
      SCORE_INTERVAL_S: "10"
      SENTINELGRID_RETENTION_DAYS: "7"
      SENTINELGRID_MAINTENANCE_INTERVAL_S: "300"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: sentinelgrid
      MINIO_SECRET_KEY: sentinelgrid123
      MINIO_BUCKET: sentinelgrid-raw
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      minio:
        condition: service_started

  minio:
    image: minio/minio:latest
    container_name: sentinelgrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sentinelgrid
      MINIO_ROOT_PASSWORD: sentinelgrid123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

